


server:
  port: 8080

spring:
  application:
    name: gateway-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-xjsdws42csm43zql.us.auth0.com/
          audiences: https://transaccionsApi
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-route
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: transaccion-route
          uri: http://localhost:8081  # DESTINO FINAL: Micro con la BD
          predicates:
            - Path=/processortransactionapi/save
          filters:
            - RequestValidationGatewayFilter
        - id: transaction-read-route
          uri: http://localhost:8081
          predicates:
            - Path=/processortransactionapi/getAllTransactions, /processortransactionapi/updateEstatusTransaction


validation:
  service:
    base-url: http://localhost:8082
    endpoint: /validate

logging:
  level:
    root: INFO
    com.api.gateway: DEBUG   # 🔥 TU CÓDIGO
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
    org.springframework.web: DEBUG